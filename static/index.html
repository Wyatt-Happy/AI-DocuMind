<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI智能档案系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        
        .nav {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 10px;
        }
        
        .nav button {
            background: none;
            border: none;
            padding: 10px 20px;
            margin: 0 5px;
            cursor: pointer;
            font-size: 16px;
            color: #666;
            border-radius: 4px;
        }
        
        .nav button.active {
            background-color: #007bff;
            color: white;
        }
        
        .section {
            display: none;
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        
        .section.active {
            display: block;
        }
        
        h2 {
            color: #555;
            margin-bottom: 15px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        input[type="text"],
        input[type="file"],
        textarea,
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        button {
            display: inline-block;
            padding: 10px 20px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        
        button:hover {
            background-color: #0069d9;
        }
        
        .result {
            margin-top: 20px;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 4px;
        }
        
        .result h3 {
            margin-bottom: 10px;
            color: #333;
        }
        
        .result-item {
            margin-bottom: 10px;
            padding: 10px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        
        .error {
            color: #dc3545;
            margin-top: 10px;
        }
        
        .success {
            color: #28a745;
            margin-top: 10px;
        }
        
        .info {
            color: #17a2b8;
            margin-top: 10px;
        }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .timeline {
            border-left: 3px solid #007bff;
            padding-left: 20px;
            margin-top: 20px;
        }
        
        .timeline-item {
            margin-bottom: 20px;
            position: relative;
        }
        
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -26px;
            top: 5px;
            width: 10px;
            height: 10px;
            background-color: #007bff;
            border-radius: 50%;
        }
        
        .timeline-date {
            font-weight: bold;
            color: #007bff;
            margin-bottom: 5px;
        }
        
        .timeline-content {
            background-color: #f8f9fa;
            padding: 10px;
            border-radius: 4px;
        }
        
        .source-tag {
            display: inline-block;
            background-color: #6c757d;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-top: 5px;
        }
        
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI智能档案系统</h1>
        
        <!-- 导航栏 -->
        <div class="nav">
            <button class="active" onclick="showSection('upload')">文件上传</button>
            <button onclick="showSection('qa')">智能问答</button>
            <button onclick="showSection('query')">人员查询</button>
            <button onclick="showSection('smartDocument')">智能文书</button>
            <button onclick="showSection('dataManagement')">数据管理</button>
        </div>
        
        <!-- 文件上传区域 -->
        <div id="upload" class="section active">
            <h2>文件上传</h2>
            <form id="uploadForm">
                <div class="form-group">
                    <label for="file">选择文件（支持 .docx 和 .pdf）</label>
                    <input type="file" id="file" name="file" accept=".docx,.pdf" required>
                </div>
                <button type="submit">上传文件</button>
                <div id="uploadResult"></div>
            </form>
            
            <div id="businessTypeSection" style="display: none; margin-top: 20px; padding: 20px; border: 1px solid #ddd; border-radius: 8px;">
                <h3>设置业务类型</h3>
                <div class="form-group">
                    <label for="businessType">业务类型</label>
                    <select id="businessType" name="businessType">
                        <option value="">请选择业务类型</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="customBusinessType">或输入自定义业务类型</label>
                    <input type="text" id="customBusinessType" name="customBusinessType" placeholder="例如：刑事案件">
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="splitDocument" name="splitDocument">
                        拆分文档
                    </label>
                </div>
                <button type="button" onclick="saveBusinessType()">保存</button>
                <button type="button" onclick="resetUploadForm()">重新上传</button>
                <div id="saveResult"></div>
            </div>
        </div>
        
        <!-- 智能问答区域 -->
        <div id="qa" class="section">
            <h2>智能问答</h2>
            <form id="qaForm">
                <div class="form-group">
                    <label for="question">问题</label>
                    <textarea id="question" name="question" placeholder="例如：张三怎么了？" required></textarea>
                </div>
                <button type="submit">提交问题</button>
                <div id="qaResult"></div>
            </form>
        </div>
        
        <!-- 人员查询区域 -->
        <div id="query" class="section">
            <h2>人员查询</h2>
            <form id="queryForm">
                <div class="form-group">
                    <label for="queryPerson">人员姓名</label>
                    <input type="text" id="queryPerson" name="person" placeholder="例如：张三" required>
                </div>
                <button type="submit">查询</button>
                <div id="queryResult"></div>
            </form>
        </div>
        
        <!-- 智能文书生成区域 -->
        <div id="smartDocument" class="section">
            <h2>智能文书生成</h2>
            
            <!-- 步骤1：选择业务类型 -->
            <div id="docInputSection" style="margin-bottom: 30px; padding: 20px; border: 1px solid #ddd; border-radius: 8px;">
                <h3>步骤1：选择业务类型</h3>
                <p style="color: #666; margin-bottom: 15px;">选择已上传并分析过的业务类型，系统将自动加载模板结构</p>
                
                <div class="form-group">
                    <label for="selectBusinessType">业务类型</label>
                    <select id="selectBusinessType" onchange="loadBusinessTypeAnalysis()">
                        <option value="">请选择业务类型</option>
                    </select>
                </div>
                
                <button type="button" onclick="refreshBusinessTypesList()">刷新列表</button>
                <div id="loadResult" style="margin-top: 15px;"></div>
            </div>
            
            <!-- 步骤2：模板信息展示 -->
            <div id="analysisResultSection" style="display: none; margin-bottom: 30px; padding: 20px; border: 1px solid #ddd; border-radius: 8px;">
                <h3>步骤2：模板信息</h3>
                
                <div id="templateInfo" style="margin-bottom: 20px; padding: 15px; background-color: #f0f8ff; border-radius: 8px;">
                    <p><strong>源文件：</strong><span id="sourceFilename">-</span></p>
                    <p><strong>可复用部分：</strong><span id="reusableCount">0</span> 个</p>
                    <p><strong>需要填写：</strong><span id="variableCount">0</span> 个变量</p>
                </div>
                
                <div id="reusablePartsSection" style="margin-bottom: 20px;">
                    <h4>可复用部分（模板固定内容）</h4>
                    <div id="reusablePartsList" style="background-color: #f9f9f9; padding: 15px; border-radius: 8px; max-height: 200px; overflow-y: auto;"></div>
                </div>
                
                <div id="variablePartsSection" style="margin-bottom: 20px;">
                    <h4>需要填写的变量</h4>
                    <div id="variablePartsList"></div>
                </div>
                
                <button type="button" onclick="showFillForm()">进入填写页面</button>
            </div>
            
            <!-- 步骤3：填写变量 -->
            <div id="fillSection" style="display: none; margin-bottom: 30px; padding: 20px; border: 1px solid #ddd; border-radius: 8px;">
                <h3>步骤3：填写信息</h3>
                <p style="color: #666; margin-bottom: 15px;">请填写以下信息，AI将结合模板生成完整文书</p>
                
                <div id="variableInputs"></div>
                
                <div class="form-group" style="margin-top: 20px;">
                    <label for="generationContext">上下文信息（可选）</label>
                    <textarea id="generationContext" rows="3" placeholder="输入额外的上下文信息，帮助AI更好地生成文书..."></textarea>
                </div>
                
                <button type="button" onclick="generateSmartDocument()">生成文书</button>
                <div id="generateResult" style="margin-top: 15px;"></div>
            </div>
            
            <!-- 步骤4：生成的文书展示 -->
            <div id="resultSection" style="display: none; margin-bottom: 30px; padding: 20px; border: 1px solid #ddd; border-radius: 8px;">
                <h3>生成的文书</h3>
                <div class="form-group">
                    <label for="generatedDocument">文书内容</label>
                    <textarea id="generatedDocument" rows="15" style="font-family: 'Courier New', monospace;"></textarea>
                </div>
                
                <div id="traceabilityInfo" style="margin-top: 15px; padding: 15px; background-color: #f9f9f9; border-radius: 8px;">
                    <h4>溯源信息</h4>
                    <div id="traceabilityContent"></div>
                </div>
                
                <button type="button" onclick="saveGeneratedDocument()">保存文书</button>
                <button type="button" onclick="resetSmartDocumentForm()">重新开始</button>
            </div>
        </div>
        
        <!-- 数据管理区域 -->
        <div id="dataManagement" class="section">
            <h2>数据管理</h2>
            
            <div style="margin-bottom: 30px; padding: 20px; border: 1px solid #ddd; border-radius: 8px;">
                <h3>数据状态</h3>
                <button type="button" onclick="loadDataStatus()">刷新数据状态</button>
                <div id="dataStatus" style="margin-top: 15px;"></div>
            </div>
            
            <div style="margin-bottom: 30px; padding: 20px; border: 1px solid #ddd; border-radius: 8px;">
                <h3>业务类型管理</h3>
                <div style="margin-bottom: 15px;">
                    <h4>添加业务类型</h4>
                    <div class="form-group">
                        <label for="newBusinessTypeName">业务类型名称</label>
                        <input type="text" id="newBusinessTypeName" placeholder="例如：刑事案件">
                    </div>
                    <button type="button" onclick="addBusinessType()">添加业务类型</button>
                    <div id="addBusinessTypeResult" style="margin-top: 10px;"></div>
                </div>
                
                <div>
                    <h4>业务类型列表</h4>
                    <button type="button" onclick="listBusinessTypes()">刷新列表</button>
                    <div id="businessTypesList" style="margin-top: 10px;"></div>
                </div>
            </div>
            
            <div style="margin-bottom: 30px; padding: 20px; border: 1px solid #ddd; border-radius: 8px;">
                <h3>删除文件数据</h3>
                <div class="form-group">
                    <label for="deleteFilename">文件名</label>
                    <select id="deleteFilename" name="filename">
                        <option value="">请选择要删除的文件</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="deleteVector" name="deleteVector" checked>
                        删除向量存储数据
                    </label>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="deleteKnowledgeGraph" name="deleteKnowledgeGraph" checked>
                        删除知识图谱数据
                    </label>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="deleteNER" name="deleteNER" checked>
                        删除NER数据
                    </label>
                </div>
                <button type="button" onclick="deleteFileData()">删除文件数据</button>
                <div id="deleteResult" style="margin-top: 15px;"></div>
            </div>
            
            <div style="padding: 20px; border: 1px solid #ff0000; border-radius: 8px; background-color: #fff5f5;">
                <h3 style="color: #ff0000;">清空所有数据</h3>
                <p style="color: #ff0000; margin-bottom: 15px;">警告：此操作将清空所有数据，包括向量存储、知识图谱、NER数据、业务类型和文件映射，且无法恢复！</p>
                <button type="button" onclick="clearAllData()" style="background-color: #ff0000; color: white;">清空所有数据</button>
                <div id="clearResult" style="margin-top: 15px;"></div>
            </div>
        </div>
    </div>
    
    <script>
        let currentUploadedFile = null;
        
        // 显示指定区域
        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(section => {
                section.classList.remove('active');
            });
            
            document.getElementById(sectionId).classList.add('active');
            
            document.querySelectorAll('.nav button').forEach(button => {
                button.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // 如果切换到文件上传页面，加载业务类型列表
            if (sectionId === 'upload') {
                loadBusinessTypes();
            }
            
            // 如果切换到智能文书页面，加载业务类型列表作为模板
            if (sectionId === 'smartDocument') {
                loadSmartDocBusinessTypes();
            }
            
            // 如果切换到数据管理页面，加载数据状态和业务类型列表
            if (sectionId === 'dataManagement') {
                loadDataStatus();
                listBusinessTypes();
            }
        }
        
        // 加载业务类型列表到下拉框
        async function loadBusinessTypes() {
            const businessTypeSelect = document.getElementById('businessType');
            
            try {
                const response = await fetch('/business-types');
                
                if (response.ok) {
                    const data = await response.json();
                    if (data.business_types && data.business_types.length > 0) {
                        businessTypeSelect.innerHTML = '<option value="">请选择业务类型</option>';
                        data.business_types.forEach(type => {
                            businessTypeSelect.innerHTML += `<option value="${type.name}">${type.name}</option>`;
                        });
                    } else {
                        businessTypeSelect.innerHTML = '<option value="">暂无业务类型，请先添加</option>';
                    }
                } else {
                    businessTypeSelect.innerHTML = '<option value="">加载失败</option>';
                }
            } catch (error) {
                businessTypeSelect.innerHTML = '<option value="">加载失败</option>';
            }
        }
        
        // 上传文件
        document.getElementById('uploadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const fileInput = document.getElementById('file');
            const file = fileInput.files[0];
            const uploadResult = document.getElementById('uploadResult');
            
            if (!file) {
                uploadResult.innerHTML = '<div class="error">请选择文件</div>';
                return;
            }
            
            const formData = new FormData();
            formData.append('file', file);
            
            try {
                uploadResult.innerHTML = '<div>上传中...</div>';
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    const data = await response.json();
                    currentUploadedFile = data.saved_filename || data.filename;
                    currentUploadedFilePath = data.file_path;
                    uploadResult.innerHTML = `<div class="success">上传成功！<br>文件名：${data.filename}<br>状态：${data.status}<br>识别到的实体：${JSON.stringify(data.entities)}<br>分割的块数：${data.chunks_count}</div>`;
                    
                    // 显示业务类型设置区域
                    document.getElementById('businessTypeSection').style.display = 'block';
                    
                    // 加载业务类型列表
                    loadBusinessTypes();
                } else {
                    try {
                        const error = await response.json();
                        uploadResult.innerHTML = `<div class="error">上传失败：${error.detail}</div>`;
                    } catch {
                        uploadResult.innerHTML = `<div class="error">上传失败：服务器返回错误</div>`;
                    }
                }
            } catch (error) {
                uploadResult.innerHTML = `<div class="error">上传失败：${error.message}<br>请确保后端服务器正在运行</div>`;
            }
        });
        
        // 保存业务类型
        async function saveBusinessType() {
            const businessType = document.getElementById('businessType').value;
            const customBusinessType = document.getElementById('customBusinessType').value;
            const splitDocument = document.getElementById('splitDocument').checked;
            const saveResult = document.getElementById('saveResult');
            
            const selectedType = customBusinessType || businessType;
            
            if (!selectedType) {
                saveResult.innerHTML = '<div class="error">请选择或输入业务类型</div>';
                return;
            }
            
            try {
                saveResult.innerHTML = '<div>保存中...</div>';
                
                // 如果是自定义业务类型，先添加到业务类型列表
                if (customBusinessType) {
                    const addResponse = await fetch('/business-types', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            name: customBusinessType,
                            description: ''
                        })
                    });
                    
                    if (!addResponse.ok) {
                        // 如果添加失败（可能已存在），继续执行
                        console.log('业务类型可能已存在，继续保存...');
                    }
                }
                
                const response = await fetch('/save-business-type', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        filename: currentUploadedFile,
                        business_type: selectedType,
                        split: splitDocument,
                        file_path: currentUploadedFilePath
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    let mergeInfo = '';
                    if (data.merged) {
                        mergeInfo = `<br><strong style="color: #2196F3;">已融合 ${data.files_count} 个文件的模板</strong>`;
                    }
                    saveResult.innerHTML = `<div class="success">保存成功！<br>文件名：${data.filename}<br>业务类型：${data.business_type}<br>拆分：${data.split ? '是' : '否'}<br>变量数：${data.variable_count}<br>可复用部分：${data.reusable_count}${mergeInfo}</div>`;
                    
                    // 刷新业务类型列表
                    loadBusinessTypes();
                } else {
                    try {
                        const error = await response.json();
                        saveResult.innerHTML = `<div class="error">保存失败：${error.detail}</div>`;
                    } catch {
                        saveResult.innerHTML = `<div class="error">保存失败：服务器返回错误</div>`;
                    }
                }
            } catch (error) {
                saveResult.innerHTML = `<div class="error">保存失败：${error.message}<br>请确保后端服务器正在运行</div>`;
            }
        }
        
        // 重置上传表单
        function resetUploadForm() {
            document.getElementById('file').value = '';
            document.getElementById('businessType').value = '';
            document.getElementById('customBusinessType').value = '';
            document.getElementById('splitDocument').checked = false;
            document.getElementById('uploadResult').innerHTML = '';
            document.getElementById('saveResult').innerHTML = '';
            document.getElementById('businessTypeSection').style.display = 'none';
            currentUploadedFile = null;
        }
        
        // 添加业务类型
        async function addBusinessType() {
            const name = document.getElementById('newBusinessTypeName').value;
            const addBusinessTypeResult = document.getElementById('addBusinessTypeResult');
            
            if (!name) {
                addBusinessTypeResult.innerHTML = '<div class="error">请输入业务类型名称</div>';
                return;
            }
            
            try {
                addBusinessTypeResult.innerHTML = '<div>添加中...</div>';
                
                const response = await fetch('/business-types', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name: name,
                        description: ''
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    addBusinessTypeResult.innerHTML = `<div class="success">添加成功！<br>名称：${data.name}</div>`;
                    
                    // 清空输入框
                    document.getElementById('newBusinessTypeName').value = '';
                    
                    // 刷新列表
                    listBusinessTypes();
                } else {
                    try {
                        const error = await response.json();
                        addBusinessTypeResult.innerHTML = `<div class="error">添加失败：${error.detail}</div>`;
                    } catch {
                        addBusinessTypeResult.innerHTML = `<div class="error">添加失败：服务器返回错误</div>`;
                    }
                }
            } catch (error) {
                addBusinessTypeResult.innerHTML = `<div class="error">添加失败：${error.message}<br>请确保后端服务器正在运行</div>`;
            }
        }
        
        // 列出业务类型
        async function listBusinessTypes() {
            const businessTypeList = document.getElementById('businessTypesList');
            
            if (!businessTypeList) {
                console.error('找不到业务类型列表元素');
                return;
            }
            
            try {
                businessTypeList.innerHTML = '<div>加载中...</div>';
                const response = await fetch('/business-types');
                
                if (response.ok) {
                    const data = await response.json();
                    if (data.business_types && data.business_types.length > 0) {
                        let typesHTML = '<table style="width: 100%; border-collapse: collapse;">';
                        typesHTML += '<tr style="background-color: #f5f5f5;"><th style="padding: 10px; border: 1px solid #ddd;">名称</th><th style="padding: 10px; border: 1px solid #ddd;">操作</th></tr>';
                        data.business_types.forEach(type => {
                            typesHTML += `<tr>`;
                            typesHTML += `<td style="padding: 10px; border: 1px solid #ddd;">${type.name}</td>`;
                            typesHTML += `<td style="padding: 10px; border: 1px solid #ddd;"><button onclick="deleteBusinessType('${type.name}')">删除</button></td>`;
                            typesHTML += `</tr>`;
                        });
                        typesHTML += '</table>';
                        businessTypeList.innerHTML = typesHTML;
                    } else {
                        businessTypeList.innerHTML = '<p>暂无业务类型</p>';
                    }
                } else {
                    try {
                        const error = await response.json();
                        businessTypeList.innerHTML = `<div class="error">获取失败：${error.detail}</div>`;
                    } catch {
                        businessTypeList.innerHTML = `<div class="error">获取失败：服务器返回错误</div>`;
                    }
                }

                    traceHtml += `<p><strong>填写变量：</strong>${traceability.variable_count} 个</p>`;
                    traceHtml += '<p><strong>填写内容：</strong></p><ul>';
                    for (const [key, value] of Object.entries(traceability.user_inputs)) {
                        traceHtml += `<li><strong>${key}:</strong> ${value}</li>`;
                    }
                    traceHtml += '</ul>';
                    document.getElementById('traceabilityContent').innerHTML = traceHtml;
                    
                    // 显示结果区域
                    document.getElementById('resultSection').style.display = 'block';
                    resultDiv.innerHTML = '<div class="success">文书生成成功！</div>';
                    document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
                } else {
                    const error = await response.json();
                    resultDiv.innerHTML = `<div class="error">生成失败：${error.detail}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">生成失败：${error.message}</div>`;
            }
        }
        
        // 重置智能文书表单
        function resetSmartDocumentForm() {
            document.getElementById('selectBusinessType').value = '';
            document.getElementById('loadResult').innerHTML = '';
            document.getElementById('analysisResultSection').style.display = 'none';
            document.getElementById('fillSection').style.display = 'none';
            document.getElementById('resultSection').style.display = 'none';
            document.getElementById('generatedDocument').value = '';
            document.getElementById('traceabilityContent').innerHTML = '';
            document.getElementById('generationContext').value = '';
            currentAnalysis = null;
            currentVariableInputs = {};
            currentBusinessType = null;
            currentTemplateContent = null;
            
            // 滚动到顶部
            document.getElementById('docInputSection').scrollIntoView({ behavior: 'smooth' });
        }
        
        // 保存生成的文档
        function saveGeneratedDocument() {
            const content = document.getElementById('generatedDocument').value;
            const businessType = currentBusinessType || '文书';
            
            if (!content) {
                alert('没有内容可保存');
                return;
            }
            
            // 创建并下载文件
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${businessType}_${new Date().toISOString().slice(0, 10)}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
        
        // 删除智能模板
        async function deleteSmartTemplate(templateId) {
            if (!confirm('确定要删除这个模板吗？')) {
                return;
            }
            
            try {
                const response = await fetch(`/smart-templates/${templateId}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    loadSmartDocBusinessTypes();
                } else {
                    alert('删除失败');
                }
            } catch (error) {
                alert('删除失败：' + error.message);
            }
        }
        
        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadBusinessTypes();
            loadSmartDocBusinessTypes();
        });
    </script>
</body>
</html>
